<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仪表生成器 — Meter Generator</title>
<style>
  :root {
    --primary: #002FA7;
    --bg: #F1F2F5;
    --panel: #FFFFFF;
    --text: #1a1c20;
    --text2: #6b7280;
    --border: #e5e7eb;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --danger: #c8281e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", "微软雅黑", "Segoe UI", sans-serif;
    background: var(--bg); display: flex;
    justify-content: center; align-items: flex-start;
    height: 100vh; padding: 12px; gap: 18px;
    overflow: hidden;
  }

  /* ── 控制面板 ──────────────────────────────── */
  .controls {
    background: var(--panel); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px 18px;
    width: 240px; display: flex; flex-direction: column; gap: 10px;
    flex-shrink: 0;
  }
  .controls h2 {
    font-size: 1.15rem; font-weight: 700; color: var(--primary);
    letter-spacing: 1px; margin-bottom: 4px;
  }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label {
    font-size: 0.8rem; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .field input {
    padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 0.95rem; font-family: "Consolas", monospace;
    outline: none; transition: border 0.2s;
  }
  .field input:focus { border-color: var(--primary); }

  .btn {
    padding: 10px 0; border: none; border-radius: 6px;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
    letter-spacing: 1px; transition: opacity 0.2s;
  }
  .btn.export {
    background: var(--primary); color: #fff;
    box-shadow: 0 2px 6px rgba(0,47,167,0.25);
  }
  .btn.export:hover { opacity: 0.88; }

  /* ── 仪表面板 ──────────────────────────────── */
  .meter-panel {
    background: var(--panel); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 18px;
    display: flex; flex-direction: column; align-items: center;
    flex: 1; max-height: calc(100vh - 24px);
  }
  .meter-panel canvas { display: block; }
  .meter-panel .info {
    margin-top: 8px; font-size: 0.78rem; color: var(--text2);
  }
</style>
</head>
<body>

<div class="controls">
  <h2>仪表参数</h2>
  <div class="field">
    <label>最小值</label>
    <input type="number" id="inMin" value="0" step="any" oninput="draw()">
  </div>
  <div class="field">
    <label>最大值</label>
    <input type="number" id="inMax" value="25" step="any" oninput="draw()">
  </div>
  <div class="field">
    <label>分度数</label>
    <input type="number" id="inDivs" value="50" step="1" min="1" oninput="draw()">
  </div>
  <div class="field">
    <label>当前值</label>
    <input type="number" id="inValue" value="5.95" step="any" oninput="draw()">
  </div>
  <div class="field">
    <label>标题（可选）</label>
    <input type="text" id="inTitle" value="" placeholder="如: 压力表" oninput="draw()">
  </div>
  <hr style="border:none;border-top:1px solid var(--border);margin:4px 0;">
  <h2 style="font-size:1rem;">平滑动画</h2>
  <div class="field">
    <label>起始值</label>
    <input type="number" id="inFrom" value="0" step="any" oninput="draw()" style="font-size:1.3rem;font-weight:700;">
  </div>
  <div class="field">
    <label>结束值</label>
    <input type="number" id="inTo" value="25" step="any" oninput="draw()" style="font-size:1.3rem;font-weight:700;">
  </div>
  <div class="field">
    <label>持续时间 (秒)</label>
    <input type="number" id="inDur" value="3" step="0.5" min="0.5" max="30" oninput="draw()">
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn export" style="flex:1;" id="btnPlay" onclick="toggleAnim()">播放</button>
    <button class="btn" style="flex:1;background:#e5e7eb;color:#333;" onclick="stopAnim()">重置</button>
  </div>
  <button class="btn export" onclick="exportPNG()" style="margin-top:8px;">导出 PNG</button>
</div>

<div class="meter-panel">
  <canvas id="meterCanvas"></canvas>
  <div id="meterValue" style="font-size:42px;font-weight:700;font-family:'Consolas','Microsoft YaHei',monospace;color:#1a1c20;margin-top:10px;">5.95</div>
  <div class="info">刻度 <span id="infoRange">0 ~ 25</span> &nbsp;|&nbsp; 分度 <span id="infoDivs">50</span></div>
</div>

<script>
// ─── 常量 ─────────────────────────────────────────────────
var ARC_START = 135;   // 左下 7:30（Canvas CW: 0=右 90=下）
var ARC_SWEEP = 270;   // 顺时针跨过顶部到右下 4:30，缺口在底部 6:00
var canvas = document.getElementById("meterCanvas");

function valueToAngle(val, minV, maxV) {
  var frac = (val - minV) / (maxV - minV);
  frac = Math.max(0, Math.min(1, frac));
  return ARC_START + frac * ARC_SWEEP;
}

function polarXY(cx, cy, r, deg) {
  var rad = deg * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function draw() {
  var SIZE = Math.min(window.innerWidth - 300, window.innerHeight - 60, 800);
  canvas.width = SIZE; canvas.height = SIZE;
  var ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, SIZE, SIZE);

  var minV = parseFloat(document.getElementById("inMin").value) || 0;
  var maxV = parseFloat(document.getElementById("inMax").value) || 25;
  var divs = parseInt(document.getElementById("inDivs").value) || 50;
  var val  = parseFloat(document.getElementById("inValue").value) || 0;
  var title = document.getElementById("inTitle").value.trim();
  if (minV >= maxV || divs < 1) return;

  document.getElementById("infoRange").textContent = minV + " ~ " + maxV;
  document.getElementById("infoDivs").textContent = divs;

  var cx = SIZE / 2, cy = SIZE / 2;
  var s = SIZE / 620;  // 比例因子
  var R_outer = 300 * s;
  var R_inner = 230 * s;
  var R_major_tick = 258 * s;
  var R_label = 212 * s;
  var R_needle = 235 * s;
  var center_r = 16 * s;

  // ── 弧带（粗弧线 + 阴影感）─────────────────────────────
  var bandW = R_outer - R_inner;
  // 分段弧线（每段 ≤180°，避免 Canvas 自动走短路径）
  function drawSegArc(r, w, color) {
    var segs = [[135, 225], [225, 315], [315, 45]];  // 三段各 90°，无法走捷径
    ctx.beginPath();
    segs.forEach(function(s) {
      ctx.arc(cx, cy, r, s[0] * Math.PI / 180, s[1] * Math.PI / 180);
    });
    ctx.lineWidth = w; ctx.strokeStyle = color; ctx.stroke();
  }
  drawSegArc((R_outer + R_inner) / 2, bandW, "#e8e9ec");
  drawSegArc(R_outer, 2.5 * s, "#c8cad0");
  drawSegArc(R_inner, 2 * s, "#c8cad0");

  // ── 刻度线（每分度一条，整数粗/非整数细）───────────
  for (var i = 0; i <= divs; i++) {
    var frac = i / divs;
    var ang = ARC_START + frac * ARC_SWEEP;
    var valAtTick = minV + (maxV - minV) * frac;
    var isInt = Math.abs(valAtTick - Math.round(valAtTick)) < 1e-9;
    var p1 = polarXY(cx, cy, R_outer + 2, ang);
    var p2 = polarXY(cx, cy, R_major_tick, ang);
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
    ctx.lineWidth = (isInt ? 2.8 : 0.8) * s;
    ctx.strokeStyle = isInt ? "#353840" : "#a0a2a8";
    ctx.stroke();
  }

  // ── 数字标签（竖直不旋转，仅整数位）─────────────────
  ctx.fillStyle = "#2a2c30";
  ctx.font = "bold " + Math.round(18 * s) + "px 'Consolas','Microsoft YaHei',monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  for (var i = 0; i <= divs; i++) {
    var lblVal = minV + (maxV - minV) * i / divs;
    if (Math.abs(lblVal - Math.round(lblVal)) > 1e-9) continue;
    if (i === 0 || i === divs) continue;  // 端点已有大字
    var ang = valueToAngle(lblVal, minV, maxV);
    var p = polarXY(cx, cy, R_label, ang);
    ctx.fillText(formatNum(Math.round(lblVal)), p.x, p.y);
  }

  // ── 指针 ──────────────────────────────────────────────
  var nAng = valueToAngle(val, minV, maxV);
  var tip = polarXY(cx, cy, R_needle, nAng);
  var bw = 11 * s;
  var bl = polarXY(cx, cy, bw, nAng + 105);
  var br = polarXY(cx, cy, bw, nAng - 105);

  // 指针阴影
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.25)";
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
  ctx.beginPath();
  ctx.moveTo(bl.x, bl.y); ctx.lineTo(tip.x, tip.y); ctx.lineTo(br.x, br.y);
  ctx.closePath();
  ctx.fillStyle = "#c8281e";
  ctx.fill();
  ctx.restore();

  // ── 中心圆 ────────────────────────────────────────────
  var grad = ctx.createRadialGradient(cx, cy, center_r * 0.3, cx, cy, center_r);
  grad.addColorStop(0, "#5a5c62");
  grad.addColorStop(1, "#2a2c30");
  ctx.beginPath();
  ctx.arc(cx, cy, center_r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.lineWidth = 2.5; ctx.strokeStyle = "#1a1c20";
  ctx.stroke();

  // ── 量程端点（大字，弧缺口外侧）─────────────────────────
  ctx.fillStyle = "#1a1c20";
  ctx.font = "bold " + Math.round(36 * s) + "px 'Consolas','Microsoft YaHei',monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  var endR = R_inner - 22 * s;
  ctx.fillText(formatNum(minV), polarXY(cx, cy, endR, ARC_START).x,
                              polarXY(cx, cy, endR, ARC_START).y);
  ctx.fillText(formatNum(maxV), polarXY(cx, cy, endR, ARC_START + ARC_SWEEP).x,
                              polarXY(cx, cy, endR, ARC_START + ARC_SWEEP).y);

  // ── 当前值 → HTML ──────────────────────────────────────
  document.getElementById("meterValue").textContent = val.toFixed(2);

  // ── 标题 ──────────────────────────────────────────────
  if (title) {
    ctx.fillStyle = "#808288";
    ctx.font = "13px 'Microsoft YaHei','微软雅黑',sans-serif";
    ctx.fillText(title, cx, cy + center_r + 78);
  }
}

function formatNum(n) {
  if (Number.isInteger(n)) return n.toString();
  var abs = Math.abs(n);
  if (abs >= 100) return n.toFixed(0);
  if (abs >= 10) return n.toFixed(1);
  if (abs >= 1) return n.toFixed(2);
  return n.toFixed(3);
}

// ── 导出 PNG ─────────────────────────────────────────────
function exportPNG() {
  // 生成大尺寸导出
  var expSize = 1200;
  var expCanvas = document.createElement("canvas");
  expCanvas.width = expSize; expCanvas.height = expSize;
  var ctx = expCanvas.getContext("2d");

  var minV = parseFloat(document.getElementById("inMin").value) || 0;
  var maxV = parseFloat(document.getElementById("inMax").value) || 25;
  var divs = parseInt(document.getElementById("inDivs").value) || 50;
  var val  = parseFloat(document.getElementById("inValue").value) || 0;
  var title = document.getElementById("inTitle").value.trim();

  var cx = expSize / 2, cy = expSize / 2;
  var R_outer = expSize * 0.42;
  var R_inner = expSize * 0.32;
  var R_major = expSize * 0.35;
  var R_minor = expSize * 0.33;
  var R_label = expSize * 0.29;
  var R_needle = expSize * 0.32;
  var center_r = expSize * 0.022;
  var bw = expSize * 0.015;

  // 白底
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, expSize, expSize);

  // 弧带
  var bandW = R_outer - R_inner;
  function drawSegArcExp(r, w, color) {
    var segs = [[135, 225], [225, 315], [315, 45]];
    ctx.beginPath();
    segs.forEach(function(s) {
      ctx.arc(cx, cy, r, s[0] * Math.PI / 180, s[1] * Math.PI / 180);
    });
    ctx.lineWidth = w; ctx.strokeStyle = color; ctx.stroke();
  }
  drawSegArcExp((R_outer + R_inner) / 2, bandW, "#e8e9ec");
  drawSegArcExp(R_outer, 3, "#b8bac0");
  drawSegArcExp(R_inner, 2.5, "#b8bac0");

  // 刻度（整数粗、非整数细）
  for (var i = 0; i <= divs; i++) {
    var frac = i / divs;
    var ang = ARC_START + frac * ARC_SWEEP;
    var valAtTick = minV + (maxV - minV) * frac;
    var isInt = Math.abs(valAtTick - Math.round(valAtTick)) < 1e-9;
    var p1 = polarXY(cx, cy, R_outer + 2, ang);
    var p2 = polarXY(cx, cy, R_major, ang);
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
    ctx.lineWidth = isInt ? 3 : 1;
    ctx.strokeStyle = isInt ? "#303238" : "#b0b2b8";
    ctx.stroke();
  }

  // 标签（竖直不旋转，仅整数位）
  ctx.fillStyle = "#2a2c30";
  ctx.font = "bold " + Math.round(expSize * 0.022) + "px 'Consolas','Microsoft YaHei',monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  for (var i = 0; i <= divs; i++) {
    var lblVal = minV + (maxV - minV) * i / divs;
    if (Math.abs(lblVal - Math.round(lblVal)) > 1e-9) continue;
    var ang = valueToAngle(lblVal, minV, maxV);
    var p = polarXY(cx, cy, R_label, ang);
    ctx.fillText(formatNum(Math.round(lblVal)), p.x, p.y);
  }


  // 指针
  var nAng = valueToAngle(val, minV, maxV);
  var tip = polarXY(cx, cy, R_needle, nAng);
  var bl = polarXY(cx, cy, bw, nAng + 105);
  var br = polarXY(cx, cy, bw, nAng - 105);
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.2)";
  ctx.shadowBlur = 8;
  ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
  ctx.beginPath();
  ctx.moveTo(bl.x, bl.y); ctx.lineTo(tip.x, tip.y); ctx.lineTo(br.x, br.y);
  ctx.closePath();
  ctx.fillStyle = "#c8281e";
  ctx.fill();
  ctx.restore();

  // 中心圆
  var grad = ctx.createRadialGradient(cx, cy, center_r*0.2, cx, cy, center_r);
  grad.addColorStop(0, "#5a5c62"); grad.addColorStop(1, "#2a2c30");
  ctx.beginPath();
  ctx.arc(cx, cy, center_r, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = "#1a1c20"; ctx.stroke();

  ctx.shadowColor = "transparent"; ctx.shadowBlur = 0;
  ctx.fillStyle = "#1a1c20";
  ctx.font = "bold " + Math.round(expSize*0.052) + "px 'Consolas','Microsoft YaHei',monospace";
  ctx.textAlign = "center";
  ctx.fillText(val.toFixed(2), cx, cy + center_r + expSize*0.08);
  if (title) {
    ctx.fillStyle = "#808288";
    ctx.font = Math.round(expSize*0.022) + "px 'Microsoft YaHei','微软雅黑',sans-serif";
    ctx.fillText(title, cx, cy + center_r + expSize*0.14);
  }

  var link = document.createElement("a");
  link.download = "meter.png";
  link.href = expCanvas.toDataURL("image/png");
  link.click();
}

// ── 平滑动画 ─────────────────────────────────────────────
var animId = null;
var animStartT = 0;
var animFrom = 0;
var animTo = 0;
var animDur = 3;

function toggleAnim() {
  if (animId) { stopAnim(); return; }
  var from = parseFloat(document.getElementById("inFrom").value);
  var to   = parseFloat(document.getElementById("inTo").value);
  var dur  = parseFloat(document.getElementById("inDur").value) || 3;
  if (isNaN(from) || isNaN(to) || from === to) return;
  animFrom = from; animTo = to; animDur = dur * 1000;
  animStartT = performance.now();
  document.getElementById("btnPlay").textContent = "播放中…";
  animId = requestAnimationFrame(animate);
}

function stopAnim() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  document.getElementById("btnPlay").textContent = "播放";
  document.getElementById("inValue").value = animFrom;
  draw();
}

function animate(now) {
  var elapsed = now - animStartT;
  var t = Math.min(elapsed / animDur, 1.0);
  t = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  var v = animFrom + (animTo - animFrom) * t;
  document.getElementById("inValue").value = v.toFixed(4);
  draw();
  if (t < 1) {
    animId = requestAnimationFrame(animate);
  } else {
    animId = null;
    document.getElementById("btnPlay").textContent = "播放";
  }
}

draw();
</script>
</body>
</html>
